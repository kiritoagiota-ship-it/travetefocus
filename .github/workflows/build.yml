name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libstdc++6 \
            libgcc1 \
            patch \
            lbzip2
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          # Esta variável faz o Buildozer aceitar as licenças do Android automaticamente
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # Garante que ele use o Python correto
          PYTHONPATH: .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TraveteFocus-APK
          path: bin/*.apk
