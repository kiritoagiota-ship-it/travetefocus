name: Build TraveteFocus APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instala dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev libsqlite3-dev ccache
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 buildozer==1.5.0

      - name: Cache Android SDK e NDK
        uses: actions/cache@v4
        id: cache-android
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
          key: android-sdk-ndk-${{ runner.os }}-v3

      - name: Instala Android SDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_ROOT/cmdline-tools

          # Baixa cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $SDK_ROOT/cmdline-tools/latest

          # Cria symlink que o buildozer espera
          mkdir -p $SDK_ROOT/tools/bin
          ln -sf $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
          ln -sf $SDK_ROOT/cmdline-tools/latest/bin/avdmanager $SDK_ROOT/tools/bin/avdmanager

          # Aceita licenças
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$SDK_ROOT \
            --licenses 2>/dev/null || true

          # Instala pacotes
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$SDK_ROOT \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools" 2>/dev/null

          echo "✓ Android SDK instalado"

      - name: Instala Android NDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          NDK_DIR=$HOME/.buildozer/android/platform
          mkdir -p $NDK_DIR
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O /tmp/ndk.zip
          echo "Extraindo NDK (~1GB, aguarde)..."
          unzip -q /tmp/ndk.zip -d $NDK_DIR
          echo "✓ NDK instalado"

      - name: Configura variáveis de ambiente
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-r25b
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$SDK_ROOT/tools/bin" >> $GITHUB_PATH

      - name: Verifica instalação
        run: |
          echo "SDK: $ANDROID_SDK_ROOT"
          echo "NDK: $ANDROID_NDK_HOME"
          ls $ANDROID_SDK_ROOT/tools/bin/
          sdkmanager --version || echo "sdkmanager via path"

      - name: Compila APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TraveteFocus-APK
          path: bin/*.apk
          if-no-files-found: error
