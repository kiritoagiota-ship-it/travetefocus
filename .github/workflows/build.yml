name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev
          pip install buildozer cython==0.29.33

      - name: Build APK
        run: |
          # Aceita as licenças do Android automaticamente
          yes | sdkmanager --licenses
          # Inicia o build
          buildozer android debug
        env:
          # Garante que o buildozer veja as ferramentas do Android
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk-bundle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TraveteFocus-APK
          path: bin/*.apk
