name: Build TraveteFocus APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      # ── 1. CÓDIGO FONTE ────────────────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ── 2. JAVA ────────────────────────────────────────────────────────────
      - name: Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. PYTHON ──────────────────────────────────────────────────────────
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 4a. CACHE — pacotes ~/.buildozer ───────────────────────────────────
      # Guarda os pacotes Python baixados pelo buildozer (Kivy wheel, etc.)
      - name: Cache Buildozer (~/.buildozer)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 4b. CACHE — compilação do projeto (.buildozer/android) ─────────────
      # NOVO: guarda os binários do Kivy já compilados para Android.
      # Sem este cache, os 17 min de compilação se repetem em cada push.
      # Com ele, a partir da 2ª execução o build cai para ~3-5 min.
      - name: Cache compilação p4a (.buildozer/android)
        uses: actions/cache@v4
        with:
          path: .buildozer/android
          key: ${{ runner.os }}-p4a-build-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-p4a-build-

      # ── 5. DEPENDÊNCIAS DO SISTEMA ─────────────────────────────────────────
      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache

      # ── 6. FERRAMENTAS PYTHON ──────────────────────────────────────────────
      - name: Instalar Cython 0.29.36 e Buildozer 1.5.0
        run: |
          pip install --upgrade pip wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0

      # ── 7. VARIÁVEIS ANDROID ───────────────────────────────────────────────
      - name: Exportar variáveis de ambiente Android SDK/NDK
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk"                   >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/local/lib/android/sdk"                       >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV

      # ── 8. SYMLINK sdkmanager ──────────────────────────────────────────────
      - name: Criar symlink sdkmanager (compatibilidade buildozer 1.5.0)
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
                  /usr/local/lib/android/sdk/tools/bin/sdkmanager
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/avdmanager \
                  /usr/local/lib/android/sdk/tools/bin/avdmanager

      # ── 9. LICENÇAS SDK ────────────────────────────────────────────────────
      - name: Aceitar licenças do Android SDK
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true

      # ── 10. BUILD ──────────────────────────────────────────────────────────
      # O flag -v força output verboso sem alterar o buildozer.spec,
      # preservando o cache de pacotes (4a). O tee grava tudo em build.log
      # mesmo que o console do GitHub Actions trunque.
      - name: Build APK (debug, verbose)
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
        timeout-minutes: 75

      # ── 11. DIAGNÓSTICO ────────────────────────────────────────────────────
      - name: Exibir últimas 300 linhas do log
        if: always()
        run: tail -n 300 build.log || true

      # ── 12. ARTEFATOS ──────────────────────────────────────────────────────
      - name: Upload APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: travetefocus-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload do log completo de build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
