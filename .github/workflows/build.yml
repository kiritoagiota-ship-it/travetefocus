name: Build TraveteFocus APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # permite disparar manualmente pela UI do GitHub

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90       # garante que um build travado não consuma minutos indefinidamente

    steps:

      # ── 1. CÓDIGO FONTE ────────────────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ── 2. JAVA ────────────────────────────────────────────────────────────
      - name: Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. PYTHON ──────────────────────────────────────────────────────────
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 4. CACHE — evita baixar p4a/kivy do zero em cada push ─────────────
      - name: Cache Buildozer (~/.buildozer)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 5. DEPENDÊNCIAS DO SISTEMA ─────────────────────────────────────────
      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache

      # ── 6. FERRAMENTAS PYTHON ──────────────────────────────────────────────
      - name: Instalar Cython 0.29.36 e Buildozer 1.5.0
        run: |
          pip install --upgrade pip wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0

      # ── 7. VARIÁVEIS ANDROID — aponta para SDK/NDK já instalados no runner ─
      - name: Exportar variáveis de ambiente Android SDK/NDK
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk"                   >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/local/lib/android/sdk"                       >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV

      # ── 8. LICENÇAS SDK ────────────────────────────────────────────────────
      - name: Aceitar licenças do Android SDK
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true

      # ── 9. BUILD ───────────────────────────────────────────────────────────
      # set -o pipefail: faz o step falhar se buildozer falhar (mesmo dentro do pipe)
      # tee build.log:  grava o log em arquivo E exibe no console ao mesmo tempo
      # log_level=1 no buildozer.spec já reduz verbosidade — arquivo completo fica
      # disponível como artefato mesmo se o console truncar.
      - name: Build APK (debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        timeout-minutes: 75

      # ── 10. DIAGNÓSTICO — últimas linhas sempre visíveis no painel ─────────
      - name: Exibir últimas 300 linhas do log
        if: always()
        run: tail -n 300 build.log || true

      # ── 11. UPLOAD DO APK ──────────────────────────────────────────────────
      - name: Upload APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: travetefocus-debug-apk
          path: bin/*.apk
          if-no-files-found: error    # falha explicitamente se o APK não existir

      # ── 12. UPLOAD DO LOG COMPLETO ─────────────────────────────────────────
      - name: Upload do log completo de build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
